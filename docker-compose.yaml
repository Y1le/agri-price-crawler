version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: agri-price-crawler-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-craw}
      MYSQL_USER: ${MYSQL_USER:-craw_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-craw_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./configs/craw.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agri-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: agri-price-crawler-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agri-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agri-price-crawler-app
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CRAW_MYSQL_HOST=mysql:3306
      - CRAW_MYSQL_USERNAME=${MYSQL_USER:-craw_user}
      - CRAW_MYSQL_PASSWORD=${MYSQL_PASSWORD:-craw_pass}
      - CRAW_MYSQL_DATABASE=${MYSQL_DATABASE:-craw}
      - CRAW_REDIS_HOST=redis
      - CRAW_REDIS_PORT=6379
      - CRAW_REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
      - CRAW_JWT_KEY=${JWT_KEY:-dffjdalkjfd890safodahjfh89ahfeahufh9a87rh9234}
      - CRAW_SERVER_MODE=${SERVER_MODE:-release}
      - CRAW_LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./var:/app/var
      - ./.env:/app/.env:ro
    networks:
      - agri-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mysql_data:
  redis_data:

networks:
  agri-network:
    driver: bridge