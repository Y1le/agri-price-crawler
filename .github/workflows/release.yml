name: Release Management

on:
  push:
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.3
          cache: true
          cache-dependency-path: go.sum

      - name: Cache tools and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/golangci-lint
            $(go env GOPATH)/bin
          key: ${{ runner.os }}-go-1.24.3-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-1.24.3-

      - name: Install required tools
        run: make tools

      - name: Tidy Go modules
        run: make tidy

      - name: Generate code
        run: make gen

      - name: Run tests
        run: make cover

      - name: Build for multiple platforms
        run: |
          # Build for different platforms
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o _output/agri-price-crawler-linux-amd64 cmd/craw-server/crawserver.go
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o _output/agri-price-crawler-linux-arm64 cmd/craw-server/crawserver.go
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o _output/agri-price-crawler-darwin-amd64 cmd/craw-server/crawserver.go
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o _output/agri-price-crawler-darwin-arm64 cmd/craw-server/crawserver.go
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o _output/agri-price-crawler-windows-amd64.exe cmd/craw-server/crawserver.go

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          body: |
            ## Release Notes
            Automated release for version ${{ github.ref }}

            ### Changes
            See commit history for details

      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: _output/
          asset_name: agri-price-crawler-binaries.zip
          asset_content_type: application/zip