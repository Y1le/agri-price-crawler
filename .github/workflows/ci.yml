name: AgriPriceCrawlerCI

# 触发规则：所有分支推送、标签推送、PR（打开/重新打开/同步）
on: 
  push:
    branches:
      - 'main'  # 仅 push main 触发
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]  # 仅 PR main 触发
  workflow_dispatch:  # 保留手动触发（可选）

jobs:
  # 核心CI流程：测试、Lint、构建
  craw_ci:
    name: CI (Go-${{ matrix.go_version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false  # 一个矩阵失败不影响其他执行
      matrix:
        go_version: [1.24.3]  # 可扩展为 [1.23, 1.24.3] 多版本测试
        os: [ubuntu-latest]   # 可扩展为 [ubuntu-latest, macos-latest]

    steps:
      # 1. 拉取代码
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整提交历史（用于lint/版本判断）

      # 2. 配置Go环境
      - name: Set up Go ${{ matrix.go_version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}
          cache: true     # 开启Go模块缓存，加速依赖下载
          cache-dependency-path: go.sum

      # 3. 缓存工具/依赖（减少重复安装）
      - name: Cache tools and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/golangci-lint
            $(go env GOPATH)/bin
          key: ${{ runner.os }}-go-${{ matrix.go_version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go_version }}-

      # 4. 安装所有依赖工具（protoc/mockgen/lint等，一键完成）
      - name: Install required tools
        run: make tools

      # 5. 整理Go依赖
      - name: Tidy Go modules
        run: make tidy

      # 6. 生成代码（mock/proto/错误码等）
      - name: Generate code (mock/proto)
        run: make gen

      # 7. 代码风格/语法检查
      - name: Lint code
        run: make lint

      # 8. 单元测试+覆盖率
      - name: Run unit test with coverage
        run: make cover

      # 9. 构建宿主平台二进制
      - name: Build binary for host platform
        run: make build

      # 10. 上传覆盖率文件（便于后续分析）
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-go${{ matrix.go_version }}
          path: _output/coverage.out
          retention-days: 7  # 保留7天
